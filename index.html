<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sail - Scramjet</title>
    <!-- MAKE SURE TO REROUTE THESE PATHS TO YOUR REAL FILES -->
    <script src="/sail/baremux/index.js"></script>
    <script src="/sail/scram/scramjet.all.js"></script>
    <script>
        // MAKE SURE THIS MATCHES THE PATH TO YOUR REAL SW
        // IMPORTANT: EDIT SW.JS TO POINT TO THE PATH OF YOUR REAL SCRAMJET FILES
        navigator.serviceWorker.register("/sail/sw.js")
    </script>
</head>
<body>
    <style>
        iframe {
            height: 95vh;
            width: 100vw;
            background: #cfcfcf;
            position: absolute;
            left:0;
            bottom: 0;
        }
    </style>

    <input type="text" placeholder="url" id="bar"><button onclick="nav()">Go</button><br>
    <iframe src="" frameborder="0" id="frame"></iframe>

    <script>
        const connection = new BareMux.BareMuxConnection("/sail/baremux/worker.js")
        // IMPORTANT: YOU MUST CHANGE YOUR WISP SERVER IN PRODUCTION. ONLY USE THIS FOR TESTING.
        // MAKE SURE YOU REROUTE TO YOUR REAL FILES!
        connection.setTransport("/sail/libcurl/index.mjs", [{ websocket: "wss://wisp.mercurywork.shop/" }])

        const frame = document.getElementById("frame")
        const bar = document.getElementById("bar")

        const { ScramjetController } = $scramjetLoadController()
        const scramjet = new ScramjetController({
            // MAKE SURE TO REROUTE THESE TO YOUR REAL FILES!
            files: {
                all: "/sail/scram/scramjet.all.js",
                wasm: "/sail/scram/scramjet.wasm.wasm",
                sync: "/sail/scram/scramjet.sync.js"
            },
            prefix: "/sail/go/" // You can change your prefix if you want, it doesn't matter what it is.
        })
        scramjet.init()

        function nav() {
            let url = bar.value.trim()
            if (!url) return;

            if (!url.includes(".")) {
                // Feel free to change the search engine to any of the following:
                // https://google.com/search?q=
                // https://duckduckgo.com/search?q=
                // https://bing.com/search?q=
                // https://qwant.com/search?q=
                // You can also choose one of your own
                url = "https://search.brave.com/search?q=" + encodeURIComponent(url)
            } else if (!url.startsWith("http://") && !url.startsWith("https://")) {
                url = "https://" + url
            }

            frame.src = scramjet.encodeUrl(url)
        }

        bar.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                nav()
            }
        })
    </script>  
    
</body>
</html>
